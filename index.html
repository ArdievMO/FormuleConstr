<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор формул</title>
    <link rel="stylesheet" href="css/site.css">
</head>
<body>
    <div class="app">
        <div class="formula-panel">
            <h3>Библиотека формул</h3>
            <div class="formula-sidebar">
                <div id="formulaTabs" class="formula-tabs"></div>
                <div id="formulaTabContent" class="formula-tab-content"></div>
            </div>
            <div class="drag-hint">
                Переместить формулы на поле → новый блок<br>
                Режим связи: нажать на кружок (выход) → кружок (вход)<br>
                Ввести числа → нажать ВЫЧИСЛИТЬ
            </div>
        </div>

        <div class="workspace">
            <div class="toolbar">
                <button id="saveBtn" class="btn btn-ctrl">СОХРАНИТЬ</button>
                <button id="loadBtn" class="btn btn-ctrl">ЗАГРУЗИТЬ</button>
                <button id="connModeBtn" class="btn btn-outline">Режим связи (OFF)</button>
                <button id="computeBtn" class="btn btn-primary">ВЫЧИСЛИТЬ</button>
                <button id="helpBtn" class="btn">Помощь</button>
                <button id="graphBtn" class="btn btn-primary">Построить график</button>
                <button id="demoBtn" class="btn">Демо-варианты</button>
                <span id="modeStatus" class="status">Режим: перемещение</span>
            </div>
            <div id="graphArea" class="graph-area">
                <div class="graph-inner">
                    <div id="rectLayer"></div>
                    <div id="graphLayer"></div>
                </div>
                <svg id="linesSvg"></svg>
            </div>
            <div class="connections-panel">
                <div style="display: flex; justify-content: space-between;">
                    <span>Активные связи параметров</span>
                    <div class="toolbar">
                        <button id="clearAllParamsConn" class="btn btn-outline" style="color:#ef4444; cursor:pointer;">удалить все связи</button>
                        <button id="clearAll" class="btn btn-outline" style="color:#ef4444; cursor:pointer;">очистить всё поле</button>
                    </div>
                </div>
                <div id="paramConnList"></div>
            </div>
        </div>
    </div>
    <script src="js/site.js"></script>
</body>
</html>
